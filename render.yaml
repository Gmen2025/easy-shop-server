services:
  - type: web
    name: easy-shop-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://easy-shop-webapp.onrender.com
      - key: CORS_ORIGINS
        sync: false
      - key: API_URL
        value: /api/v1
      - key: PORT
        value: 3001
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_KEY_E_SHOPUSA
        sync: false
      - key: STRIPE_KEY_USA
        sync: false
      - key: EMAIL_SERVICE
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
    # Add your environment variables in Render Dashboard
    # Don't put secrets here - configure them in Render's Environment tab
